<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#04050c;--surface:#0c0f1a;--lifted:#111622;
  --border:rgba(255,255,255,.06);--snow:#dde6f5;
  --fog:rgba(221,230,245,.50);--mist:rgba(221,230,245,.22);
  --gold:#f0b429;--gold-bright:#ffd166;
  --ff:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --spring:cubic-bezier(0.16,1,0.3,1);--bounce:cubic-bezier(0.34,1.56,0.64,1);
}
html{scroll-behavior:smooth;}
body{background:var(--void);color:var(--snow);font-family:var(--ff);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;cursor:none;}
@media(pointer:coarse){body{cursor:auto;}}
#c-dot{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--gold-bright);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 0 2px rgba(240,180,41,.15),0 0 14px 4px var(--gold),0 0 30px 8px rgba(240,180,41,.3);transition:width .14s var(--spring),height .14s var(--spring),box-shadow .25s,background .2s;}
#c-spotlight{position:fixed;inset:0;pointer-events:none;z-index:1;transition:background .04s linear;}
body.ch #c-dot{width:14px;height:14px;background:#fff;box-shadow:0 0 0 3px rgba(240,180,41,.2),0 0 20px 6px var(--gold),0 0 50px 16px rgba(240,180,41,.25);}
body.cc #c-dot{width:5px;height:5px;background:var(--gold-bright);box-shadow:0 0 0 6px rgba(240,180,41,.15),0 0 24px 10px var(--gold),0 0 55px 20px rgba(240,180,41,.35);}
body.ct #c-dot{width:3px;height:22px;border-radius:2px;background:var(--gold-bright);}
@media(pointer:coarse){#c-dot,#c-spotlight{display:none;}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--void);}::-webkit-scrollbar-thumb{background:#2a1800;border-radius:2px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(240,180,41,.06) 1px,transparent 1px);background-size:36px 36px;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 100%);animation:gridDrift 30s ease-in-out infinite alternate;}
@keyframes gridDrift{from{background-position:0 0;}to{background-position:36px 36px;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{from{opacity:0;transform:scale(.93) translateY(18px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes panelIn{from{opacity:0;transform:translateY(-10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes shimmer{from{background-position:-200% center;}to{background-position:200% center;}}
@keyframes pulse{0%,100%{opacity:.35;transform:scale(1);}50%{opacity:.7;transform:scale(1.06);}}
@keyframes floatP{0%{transform:translateY(0) translateX(0) scale(1);opacity:0;}10%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(-120vh) translateX(var(--dx)) scale(.3);opacity:0;}}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px) scale(.95);}}
@keyframes streakPop{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}
@keyframes confettiDrop{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110px) rotate(720deg);opacity:0;}}
@keyframes pipPulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
@keyframes orbPulse{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.6;transform:scale(1.06);}}
.shimmer-txt{background:linear-gradient(90deg,#fff 0%,#fff 40%,rgba(255,255,255,.4) 50%,#fff 60%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;}
.kbd{display:inline-block;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:2px 7px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.38);}
.card-scene{animation:cardIn .45s cubic-bezier(.34,1.56,.64,1) forwards;perspective:1200px;cursor:pointer;}
.flip-wrap{transition:transform .65s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;position:relative;width:100%;}
.flip-wrap.flipped{transform:rotateY(180deg);}
.face,.back-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;width:100%;}
.face{position:relative;min-height:340px;}
.back-face{position:absolute;top:0;left:0;min-height:100%;transform:rotateY(180deg);}
.btn-nav{transition:all .2s ease;}.btn-nav:hover{background:rgba(255,255,255,.08)!important;transform:translateY(-1px);}.btn-nav:active{transform:scale(.97);}
.btn-flip{transition:all .25s ease;position:relative;overflow:hidden;}.btn-flip:hover{transform:translateY(-2px);filter:brightness(1.15);}.btn-flip:active{transform:scale(.97);}
.rating-btn{transition:all .2s cubic-bezier(.34,1.56,.64,1);cursor:pointer;border:none;outline:none;}.rating-btn:hover{transform:scale(1.12) translateY(-1px);}.rating-btn:active{transform:scale(.95);}
.dot{transition:all .4s cubic-bezier(.34,1.56,.64,1);cursor:pointer;}.dot:hover{transform:scale(1.7)!important;}
.tag-pill{transition:all .22s;cursor:pointer;}.tag-pill:hover{filter:brightness(1.3);transform:scale(1.05);}
.search-input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 36px 9px 36px;color:#fff;font-family:var(--mono);font-size:12px;width:100%;outline:none;transition:border-color .2s;}.search-input:focus{border-color:rgba(255,255,255,.22);}.search-input::placeholder{color:rgba(255,255,255,.2);}
.toast{animation:toastIn .3s ease forwards;}.toast.out{animation:toastOut .3s ease forwards;}
.confetti{position:fixed;pointer-events:none;z-index:9999;animation:confettiDrop .9s ease-in forwards;}
.stats-panel{animation:panelIn .25s ease forwards;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;animation:toastIn .2s ease forwards;backdrop-filter:blur(4px);}
.streak-num{display:inline-block;animation:streakPop .4s ease;}
/* visual strip on front */
.visual-strip{position:absolute;top:0;left:0;right:0;height:80px;overflow:hidden;border-radius:22px 22px 0 0;}
</style>
</head>
<body>
<div id="c-dot"></div>
<div id="c-spotlight"></div>
<div id="particles" style="position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;"></div>
<div id="amb-orb" style="position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(240,180,41,.07) 0%,transparent 70%);top:5%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:0;animation:orbPulse 4s ease-in-out infinite;transition:background .7s ease;"></div>
<div style="position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);"></div>
<div id="confetti-container" style="position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;"></div>
<div id="toast" style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);border-radius:12px;padding:10px 20px;z-index:1000;font-family:var(--mono);font-size:12px;letter-spacing:.1em;white-space:nowrap;display:none;pointer-events:none;"></div>
<div id="confirm-overlay" class="confirm-overlay" style="display:none;">
  <div id="confirm-box" style="background:rgba(10,10,20,.98);border:1px solid #c084fc40;border-radius:20px;padding:28px 32px;max-width:340px;width:90%;box-shadow:0 0 40px #c084fc20;">
    <div style="font-size:13px;color:rgba(255,255,255,.7);font-family:var(--mono);line-height:1.6;margin-bottom:22px;text-align:center;">Reset all progress? This clears your seen cards, ratings, bookmarks and streak.</div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button id="confirm-cancel" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:9px 22px;border-radius:9px;cursor:pointer;font-family:var(--ff);font-size:12px;font-weight:600;transition:all .2s;">Cancel</button>
      <button id="confirm-ok" style="border:none;padding:9px 22px;border-radius:9px;cursor:pointer;font-family:var(--ff);font-size:12px;font-weight:700;background:#c084fc;color:#000;transition:all .2s;">Reset Session</button>
    </div>
  </div>
</div>

<div id="app" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 60px;position:relative;z-index:2;">
  <div style="width:100%;max-width:680px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <a href="types-of-ai-models.html" id="back-btn" style="font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(221,230,245,.35);text-decoration:none;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.07);padding:8px 14px;border-radius:9px;background:rgba(255,255,255,.02);transition:all .2s;">← Library</a>
    <div style="font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(240,180,41,.5);display:flex;align-items:center;gap:7px;">
      <span style="width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pipPulse 2.5s ease-in-out infinite;display:inline-block;"></span>
      Vol. I · AI Model
    </div>
  </div>

  <div style="text-align:center;margin-bottom:24px;animation:slideUp .5s ease forwards;width:100%;max-width:680px;">
    <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:30px;padding:5px 16px;margin-bottom:14px;">
      <div id="pip" style="width:5px;height:5px;border-radius:50%;background:#c084fc;box-shadow:0 0 8px #c084fc;animation:pulse 2s infinite;"></div>
      <span style="font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.35);text-transform:uppercase;font-family:var(--mono);">MoE Study Deck · 18 Cards</span>
    </div>
    <div style="font-size:52px;margin-bottom:8px;">⚡</div>
    <h1 style="font-size:clamp(26px,5vw,46px);line-height:1.1;font-weight:800;letter-spacing:-.03em;">
      <span class="shimmer-txt">MoE</span><br/>
      <span id="title-accent" style="transition:color .5s,text-shadow .5s;color:#c084fc;font-size:clamp(16px,2.5vw,24px);font-weight:600;letter-spacing:.01em;">Mixture of Experts</span>
    </h1>
  </div>

  <div style="width:100%;max-width:680px;" id="main-content">
    <div style="display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;" id="toolbar"></div>
    <div id="search-wrap" style="position:relative;margin-bottom:14px;display:none;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);font-size:14px;pointer-events:none;">⌕</span>
      <input class="search-input" id="search-input" placeholder="Search cards…" autocomplete="off"/>
      <button id="search-clear" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;display:none;">✕</button>
      <span id="search-count" style="position:absolute;right:38px;top:50%;transform:translateY(-50%);font-size:9px;color:rgba(255,255,255,.22);font-family:var(--mono);display:none;"></span>
    </div>
    <div id="stats-panel" class="stats-panel" style="background:rgba(10,10,20,.95);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px;backdrop-filter:blur(20px);margin-bottom:18px;display:none;"></div>
    <div id="filter-bar" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;"></div>
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <div style="display:flex;align-items:center;gap:8px;" id="cat-label"></div>
        <span id="pos-label" style="font-size:9px;color:rgba(255,255,255,.25);font-family:var(--mono);"></span>
      </div>
      <div style="height:2px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden;">
        <div id="progress-bar" style="height:100%;border-radius:1px;transition:width .5s ease,background .4s ease;width:0%;"></div>
      </div>
    </div>
    <div id="card-area" style="margin-bottom:14px;"></div>
    <div style="display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:20px;" id="nav-controls"></div>
    <div id="dot-nav" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:500px;margin:0 auto 18px;"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:12px 16px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:14px;" id="kbd-hints"></div>
    <div style="text-align:center;margin-top:10px;font-size:9px;color:rgba(255,255,255,.1);font-family:var(--mono);letter-spacing:.12em;">SWIPE ← → TO NAVIGATE · SWIPE ↑ TO FLIP</div>
  </div>
</div>

<script>
var ALL_CARDS = [{"id": 1, "category": "FUNDAMENTALS", "icon": "◈", "visual": "⚡", "tag": "Core Concept", "front": "What is Mixture of Experts (MoE)?", "back": "A model architecture where only a subset of network parameters (called 'experts') are activated for each input. A gating network routes each token to the top-k most relevant experts.\n\nResult: massive parameter counts with dense-model compute costs — the key efficiency trick behind models like Mixtral and GPT-4.", "gradient": "linear-gradient(135deg,#1a001a,#2d0040,#1a001a)", "glow": "#c084fc"}, {"id": 2, "category": "FUNDAMENTALS", "icon": "◉", "visual": "🎯", "tag": "Sparsity", "front": "What is Sparse Activation in MoE?", "back": "In a dense model, all parameters are used for every token. In sparse MoE:\n• Typically 2 of N experts are activated per token\n• N may be 8, 64, or even 1024 experts\n• Only active expert parameters use compute\n\nExample: Mixtral 8x7B has 47B parameters but only uses ~13B per token.", "gradient": "linear-gradient(135deg,#180016,#2c0038,#180016)", "glow": "#d8b4fe"}, {"id": 3, "category": "ARCHITECTURE", "icon": "⬡", "visual": "🔀", "tag": "Gating", "front": "How does the Gating Network work?", "back": "The router that selects which experts process each token:\n• Linear layer + softmax over experts\n• Top-k selection (usually k=1 or k=2)\n• Gates are learned during training\n\nGating formula: G(x) = softmax(x·W_g)\nOnly top-k weights are kept; rest zeroed out.", "gradient": "linear-gradient(135deg,#1a001c,#30003a,#1a001c)", "glow": "#c084fc"}, {"id": 4, "category": "ARCHITECTURE", "icon": "⬢", "visual": "📐", "tag": "Design", "front": "Where are MoE layers placed in Transformers?", "back": "In standard Transformers, the FFN (feed-forward network) after attention is replaced by an MoE layer:\n• Attention: same for all tokens (shared computation)\n• FFN → MoE: sparse, token-routed\n• Often every other layer is MoE (alternating dense+sparse)\n\nAttention layers remain dense and shared.", "gradient": "linear-gradient(135deg,#160016,#280034,#160016)", "glow": "#a855f7"}, {"id": 5, "category": "TRAINING", "icon": "∿", "visual": "⚖️", "tag": "Load Balancing", "front": "What is the Load Balancing Problem in MoE?", "back": "Without intervention, the router collapses — all tokens route to the same few experts (expert collapse).\n\nSolutions:\n• Auxiliary load balancing loss — penalizes uneven routing\n• Expert capacity limits — each expert has a max token budget\n• Token dropping — exceed-capacity tokens skip the expert\n\nCritical for training stability.", "gradient": "linear-gradient(135deg,#1a001a,#30003c,#1a001a)", "glow": "#d8b4fe"}, {"id": 6, "category": "TRAINING", "icon": "⚟", "visual": "💾", "tag": "Memory", "front": "What are MoE memory challenges?", "back": "MoE models require loading ALL expert parameters into memory (GPU VRAM) even though only a few are used per token:\n• Mixtral 8x7B: 47B params — needs multi-GPU inference\n• Expert parallelism: split experts across GPUs\n• High memory bandwidth requirement\n\nInference is compute-efficient but memory-expensive.", "gradient": "linear-gradient(135deg,#18001a,#2c0038,#18001a)", "glow": "#c084fc"}, {"id": 7, "category": "SCALING", "icon": "⟳", "visual": "📈", "tag": "Scaling", "front": "How does MoE improve scaling efficiency?", "back": "MoE allows increasing model capacity without proportionally increasing FLOPs:\n• 10× more parameters → ~2× more compute (not 10×)\n• Better performance per FLOP than dense models\n• Enables trillion-parameter models at reasonable cost\n\nKey insight: more parameters ≠ more compute with sparse activation.", "gradient": "linear-gradient(135deg,#1a001e,#2e0040,#1a001e)", "glow": "#a855f7"}, {"id": 8, "category": "SCALING", "icon": "△", "visual": "🌟", "tag": "Examples", "front": "What are notable MoE models?", "back": "• Mixtral 8x7B / 8x22B — Mistral AI, open source\n• GPT-4 — reportedly MoE (8 experts, unconfirmed)\n• Gemini 1.5 Pro — Google, sparse MoE\n• DeepSeek-V2/V3 — 236B params, 21B active\n• Switch Transformer — Google, 1T+ params MoE\n• GLaM — Google, 1.2T params", "gradient": "linear-gradient(135deg,#1c001c,#320040,#1c001c)", "glow": "#d8b4fe"}, {"id": 9, "category": "ARCHITECTURE", "icon": "◬", "visual": "🔬", "tag": "Expert Specialization", "front": "Do MoE experts specialize?", "back": "Yes — analysis shows experts often self-organize by:\n• Syntactic role (nouns, verbs, punctuation)\n• Language or domain (code, math, natural language)\n• Topic or subject matter\n\nThis specialization is emergent — not explicitly trained. It's evidence that sparse routing enables meaningful division of labor.", "gradient": "linear-gradient(135deg,#160016,#280038,#160016)", "glow": "#c084fc"}, {"id": 10, "category": "TRAINING", "icon": "◎", "visual": "🔧", "tag": "Expert Parallelism", "front": "What is Expert Parallelism?", "back": "A distributed training/inference strategy for MoE:\n• Different experts live on different GPUs/nodes\n• Tokens are routed to the correct GPU for expert computation\n• Requires all-to-all communication between GPUs\n\nCombined with tensor parallelism and pipeline parallelism for large-scale MoE training.", "gradient": "linear-gradient(135deg,#1a001c,#2e003a,#1a001c)", "glow": "#a855f7"}, {"id": 11, "category": "FUNDAMENTALS", "icon": "◈", "visual": "🎭", "tag": "Soft vs Hard", "front": "What is Soft MoE vs Hard (Top-k) MoE?", "back": "Hard MoE: discretely selects top-k experts, others get zero weight\n• More efficient, used in Mixtral, Switch Transformer\n\nSoft MoE: weighted blend of all experts\n• More stable training, less sharp routing\n• Higher compute (all experts run)\n• Used in some research settings", "gradient": "linear-gradient(135deg,#18001a,#2c0038,#18001a)", "glow": "#d8b4fe"}, {"id": 12, "category": "SCALING", "icon": "⬡", "visual": "🏗️", "tag": "DeepSeek", "front": "What is DeepSeek's MoE innovation?", "back": "DeepSeek-V2/V3 introduced:\n• Fine-grained experts (many small experts vs few large)\n• Shared experts (always active) + routed experts (selective)\n• 256 routed + 1 shared expert architecture\n• DeepSeekMoE achieves GPT-4 level at fraction of cost\n\nDemonstrated that MoE can be extremely cost-efficient.", "gradient": "linear-gradient(135deg,#1a001e,#300040,#1a001e)", "glow": "#c084fc"}, {"id": 13, "category": "EVALUATION", "icon": "⚖", "visual": "⚡", "tag": "Dense vs Sparse", "front": "MoE vs Dense Models: Trade-offs", "back": "MoE Advantages:\n• More parameters at same compute budget\n• Better performance per FLOP\n• Expert specialization\n\nMoE Disadvantages:\n• Higher memory requirements\n• Training instability (load balancing)\n• Inference latency (all-to-all communication)\n• Harder to fine-tune", "gradient": "linear-gradient(135deg,#160016,#2a0036,#160016)", "glow": "#a855f7"}, {"id": 14, "category": "ARCHITECTURE", "icon": "⬢", "visual": "🛣️", "tag": "Routing", "front": "What is Token Choice vs Expert Choice Routing?", "back": "Token Choice: each token selects its top-k experts\n• Uneven load possible\n• Standard approach\n\nExpert Choice: each expert selects its top-k tokens\n• Perfectly balanced load\n• Some tokens may be dropped\n• Google used this in Switch Transformer variants", "gradient": "linear-gradient(135deg,#1a001a,#2e0038,#1a001a)", "glow": "#d8b4fe"}, {"id": 15, "category": "TRAINING", "icon": "◉", "visual": "📊", "tag": "Auxiliary Loss", "front": "How does the auxiliary load balancing loss work?", "back": "Added to the main language modeling loss:\n\nL_aux = α · Σ(fᵢ · Pᵢ)\n\n• fᵢ = fraction of tokens routed to expert i\n• Pᵢ = average router probability for expert i\n• α = small coefficient (0.01–0.1)\n\nMinimizing this encourages uniform expert utilization.", "gradient": "linear-gradient(135deg,#18001c,#2c003a,#18001c)", "glow": "#c084fc"}, {"id": 16, "category": "SCALING", "icon": "∿", "visual": "🔭", "tag": "Future", "front": "What is the future of MoE research?", "back": "Active research directions:\n• Conditional compute beyond FFN layers (attention MoE)\n• Hierarchical MoE (nested routing)\n• Dynamic k selection per token\n• MoE for multimodal models\n• Reducing communication overhead\n• Better fine-tuning methods for sparse models", "gradient": "linear-gradient(135deg,#1a001a,#2e003e,#1a001a)", "glow": "#a855f7"}, {"id": 17, "category": "FUNDAMENTALS", "icon": "⟁", "visual": "🔑", "tag": "Key Insight", "front": "Why is MoE so important for frontier AI?", "back": "The scaling hypothesis: more parameters → better models. But compute is a bottleneck.\n\nMoE breaks this bottleneck:\n• Train a 1T+ parameter model\n• Only use 10–50B parameters per forward pass\n• Get trillion-parameter knowledge at dense-70B compute\n\nThis is why GPT-4, Gemini, and Grok are likely MoE.", "gradient": "linear-gradient(135deg,#160018,#28003a,#160018)", "glow": "#d8b4fe"}, {"id": 18, "category": "EVALUATION", "icon": "⟳", "visual": "🏆", "tag": "Performance", "front": "MoE vs Dense: Performance at equal FLOP budget", "back": "At equal training FLOPs:\n• MoE models consistently outperform dense models\n• Switch Transformer: 7× better sample efficiency vs T5\n• Mixtral 8x7B outperforms Llama 2 70B (dense) on most benchmarks despite fewer active params\n• DeepSeek-V3: matches GPT-4o at ~1/10th training cost\n\nMoE is the dominant large-scale training paradigm.", "gradient": "linear-gradient(135deg,#1a001c,#300040,#1a001c)", "glow": "#c084fc"}];

        '<div style="flex-shrink:0;border-top:1px solid '+card.glow+'20;border-radius:0 0 22px 22px;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;">'+
          '<span style="font-size:7px;color:'+card.glow+'70;font-family:var(--mono);letter-spacing:.2em;text-transform:uppercase;margin-right:2px;">HOW\'D IT GO?</span>'+
          ['easy','medium','hard'].map(function(level,i){var labels=['Easy','Medium','Hard'];var colors=['#00ff88','#ffdd00','#ff4444'];var keys=['1','2','3'];return'<button class="rating-btn" data-level="'+level+'" style="background:'+colors[i]+'15;border:1px solid '+colors[i]+'40;color:'+colors[i]+';padding:6px 12px;border-radius:8px;font-size:10px;font-family:var(--ff);font-weight:700;">'+labels[i]+' <span class="kbd">'+keys[i]+'</span></button>';}).join('')+
        '</div>'+
        '<div style="position:absolute;inset:0;border-radius:22px;pointer-events:none;background:radial-gradient(ellipse at 50% 100%,'+card.glow+'09 0%,transparent 60%);"></div>'+
      '</div>'+
    '</div>'+
  '</div>';
var scene=document.getElementById('card-scene-'+state.animKey);
if(scene){scene.addEventListener('click',function(e){if(e.target.classList.contains('rating-btn')||e.target.closest&&e.target.closest('.rating-btn'))return;state.flipped=!state.flipped;var fw=document.getElementById('flip-wrap');if(fw){fw.className='flip-wrap'+(state.flipped?' flipped':'');}});addHoverClass(scene);}
area.querySelectorAll('.rating-btn').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();handleRate(this.dataset.level);});addHoverClass(btn);});}
function renderNavControls(){var nc=document.getElementById('nav-controls');if(!nc)return;var card=currentCard();nc.innerHTML='<button class="btn-nav" id="btn-prev" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);padding:12px 18px;border-radius:11px;cursor:pointer;font-size:12px;font-family:var(--ff);letter-spacing:.04em;">← <span class="kbd">P</span></button><button class="btn-flip" id="btn-flip" style="background:linear-gradient(135deg,'+card.glow+'cc,'+card.glow+'88);border:none;color:#000;padding:12px 30px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--ff);letter-spacing:.07em;box-shadow:0 4px 20px '+card.glow+'35;">'+(state.flipped?'◈ Hide':'◈ Reveal')+' <span style="opacity:.6;font-weight:400;">Space</span></button><button class="btn-nav" id="btn-bm" style="background:'+(state.bookmarks.has(card.id)?'rgba(255,221,0,.08)':'rgba(255,255,255,.04)')+';border:1px solid '+(state.bookmarks.has(card.id)?'#ffdd0040':'rgba(255,255,255,.09)')+';color:'+(state.bookmarks.has(card.id)?'#ffdd00':'rgba(255,255,255,.35)')+';padding:12px 13px;border-radius:11px;cursor:pointer;font-size:15px;transition:all .2s;">✦</button><button class="btn-nav" id="btn-next" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.45);padding:12px 18px;border-radius:11px;cursor:pointer;font-size:12px;font-family:var(--ff);letter-spacing:.04em;"><span class="kbd">N</span> →</button>';
document.getElementById('btn-prev').addEventListener('click',goPrev);document.getElementById('btn-flip').addEventListener('click',function(){state.flipped=!state.flipped;var fw=document.getElementById('flip-wrap');if(fw){fw.className='flip-wrap'+(state.flipped?' flipped':'');}renderNavControls();});document.getElementById('btn-bm').addEventListener('click',function(){toggleBookmark(card.id);});document.getElementById('btn-next').addEventListener('click',goNext);nc.querySelectorAll('button').forEach(addHoverClass);}
function renderDotNav(){var dn=document.getElementById('dot-nav');if(!dn)return;var d=getFiltered();var si=safeIdx(d);dn.innerHTML='';d.forEach(function(c,i){var m=CAT_META[c.category];var isActive=i===si;var dot=document.createElement('div');dot.className='dot';dot.title=c.front;dot.style.cssText='width:'+(isActive?'22':'7')+'px;height:7px;border-radius:4px;background:'+(isActive?m.color:state.seen.has(c.id)?'rgba(255,255,255,.15)':'rgba(255,255,255,.05)')+';box-shadow:'+(isActive?'0 0 8px '+m.color:'none')+';cursor:pointer;transition:all .4s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;';(function(idx,dLen){dot.addEventListener('click',function(){goTo(idx,dLen);});})(i,d.length);dn.appendChild(dot);});}
function renderKbdHints(){var kh=document.getElementById('kbd-hints');if(!kh)return;var hints=[['Space','Flip'],['← →','Navigate'],['B','Bookmark'],['1-3','Rate'],['S','Search'],['T','Timer'],['Esc','Close']];kh.innerHTML=hints.map(function(h){return'<div style="display:flex;align-items:center;gap:4px;"><span class="kbd">'+h[0]+'</span><span style="font-size:8px;color:rgba(255,255,255,.2);letter-spacing:.1em;font-family:var(--mono);">'+h[1]+'</span></div>';}).join('');}
function renderConfirm(){var ov=document.getElementById('confirm-overlay');ov.style.display=state.showConfirm?'flex':'none';}
function render(){renderToolbar();renderSearch();renderStats();renderFilterBar();renderProgress();renderCard();renderNavControls();renderDotNav();renderKbdHints();renderConfirm();}
(function(){var dot=document.getElementById('c-dot');var spl=document.getElementById('c-spotlight');if(!dot)return;var mx=window.innerWidth/2,my=window.innerHeight/2;var glowHex='rgba(240,180,41,';document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';if(spl){spl.style.background='radial-gradient(circle 120px at '+mx+'px '+my+'px,'+glowHex+'0.14) 0%,'+glowHex+'0.06) 38%,transparent 68%)';}});document.addEventListener('mousedown',function(e){document.body.classList.add('cc');var r=document.createElement('div');r.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:99990;background:rgba(240,180,41,.5);transform:translate(-50%,-50%) scale(1);transition:transform .55s cubic-bezier(.2,.8,.3,1),opacity .55s ease;';document.body.appendChild(r);requestAnimationFrame(function(){r.style.transform='translate(-50%,-50%) scale(10)';r.style.opacity='0';});setTimeout(function(){r.remove();},620);});document.addEventListener('mouseup',function(){document.body.classList.remove('cc');});function addInteractive(sel){document.querySelectorAll(sel).forEach(function(el){el.addEventListener('mouseenter',function(){document.body.classList.add('ch');});el.addEventListener('mouseleave',function(){document.body.classList.remove('ch');});});}addInteractive('a,button,.card-scene,.rating-btn,.dot,.tag-pill,.btn-nav,.btn-flip');document.querySelectorAll('input,textarea').forEach(function(el){el.addEventListener('mouseenter',function(){document.body.classList.add('ct');});el.addEventListener('mouseleave',function(){document.body.classList.remove('ct');});});var mo=new MutationObserver(function(){addInteractive('a,button,.card-scene,.rating-btn,.dot,.tag-pill,.btn-nav,.btn-flip');});mo.observe(document.body,{childList:true,subtree:true});window.setCursorGlow=function(hex){glowHex=hexToRgba(hex);dot.style.boxShadow='0 0 0 2px '+glowHex+'.15),0 0 14px 4px '+hex+',0 0 30px 8px '+glowHex+'.30)';};function hexToRgba(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);return'rgba('+r+','+g+','+b+',';}})();
document.addEventListener('keydown',function(e){if(e.key==='Escape'){state.showSearch=false;state.showStats=false;state.showConfirm=false;state.search='';render();return;}if(document.activeElement&&document.activeElement.tagName==='INPUT')return;var d=getFiltered();var si=safeIdx(d);var card=d[si]||ALL_CARDS[0];if(e.key===' '||e.key==='f'){e.preventDefault();state.flipped=!state.flipped;var fw=document.getElementById('flip-wrap');if(fw)fw.className='flip-wrap'+(state.flipped?' flipped':'');renderNavControls();}if(e.key==='ArrowRight'||e.key==='n'){state.seen.add(card.id);persist();checkComplete();goTo(si+1,d.length);}if(e.key==='ArrowLeft'||e.key==='p')goTo(si-1,d.length);if(e.key==='b'){toggleBookmark(card.id);}if(e.key==='s'){state.showSearch=!state.showSearch;if(!state.showSearch){state.search='';state.idx=0;state.flipped=false;}render();setTimeout(function(){var i=document.getElementById('search-input');if(i&&state.showSearch)i.focus();},50);}if(e.key==='t'){state.timerOn=!state.timerOn;if(state.timerOn)startTimer();else stopTimer();render();}if(state.flipped){if(e.key==='1')handleRate('easy');if(e.key==='2')handleRate('medium');if(e.key==='3')handleRate('hard');}});
document.addEventListener('input',function(e){if(e.target&&e.target.id==='search-input'){state.search=e.target.value;state.idx=0;state.flipped=false;renderSearch();renderProgress();renderCard();renderNavControls();renderDotNav();renderFilterBar();}});
document.addEventListener('click',function(e){if(e.target&&e.target.id==='search-clear'){state.search='';state.idx=0;state.flipped=false;render();}});
(function(){var tx=0,ty=0;document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-tx;var dy=e.changedTouches[0].clientY-ty;var d=getFiltered();var si=safeIdx(d);var card=d[si]||ALL_CARDS[0];if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){if(dx<0){state.seen.add(card.id);persist();checkComplete();goTo(si+1,d.length);}else goTo(si-1,d.length);}else if(dy<-60&&Math.abs(dy)>Math.abs(dx)){state.flipped=!state.flipped;var fw=document.getElementById('flip-wrap');if(fw)fw.className='flip-wrap'+(state.flipped?' flipped':'');renderNavControls();}},{passive:true});})();
document.getElementById('confirm-cancel').addEventListener('click',function(){state.showConfirm=false;render();});
document.getElementById('confirm-ok').addEventListener('click',doReset);
document.getElementById('confirm-overlay').addEventListener('click',function(e){if(e.target===this){state.showConfirm=false;render();}});
var bb=document.getElementById('back-btn');if(bb){addHoverClass(bb);bb.addEventListener('mouseenter',function(){this.style.borderColor='rgba(240,180,41,.3)';this.style.color='rgba(221,230,245,.6)';});bb.addEventListener('mouseleave',function(){this.style.borderColor='rgba(255,255,255,.07)';this.style.color='rgba(221,230,245,.35)';});}
render();
</script>
