<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Flashcards — The Scriptorium</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#04050c;
  --surface:#0c0f1a;
  --lifted:#111622;
  --border:rgba(255,255,255,.06);
  --snow:#dde6f5;
  --fog:rgba(221,230,245,.50);
  --mist:rgba(221,230,245,.22);
  --gold:#f0b429;
  --gold-bright:#ffd166;
  --ff:'Syne',sans-serif;
  --mono:'DM Mono',monospace;
  --spring:cubic-bezier(0.16,1,0.3,1);
  --bounce:cubic-bezier(0.34,1.56,0.64,1);
}
html{scroll-behavior:smooth;}
body{
  background:var(--void);color:var(--snow);
  font-family:var(--ff);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;cursor:none;
}
@media(pointer:coarse){body{cursor:auto;}}

/* ── Enhanced Spotlight Cursor ── */
#c-dot{
  position:fixed;width:10px;height:10px;border-radius:50%;
  background:var(--gold-bright);pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 0 2px rgba(240,180,41,.15),0 0 14px 4px var(--gold),0 0 30px 8px rgba(240,180,41,.3);
  transition:width .14s var(--spring),height .14s var(--spring),box-shadow .25s,background .2s;
  will-change:left,top;
}

#c-spotlight{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  transition:background .04s linear;
}
body.ch #c-dot{width:14px;height:14px;background:#fff;
  box-shadow:0 0 0 3px rgba(240,180,41,.2),0 0 20px 6px var(--gold),0 0 50px 16px rgba(240,180,41,.25);}

body.cc #c-dot{width:5px;height:5px;background:var(--gold-bright);
  box-shadow:0 0 0 6px rgba(240,180,41,.15),0 0 24px 10px var(--gold),0 0 55px 20px rgba(240,180,41,.35);}

body.ct #c-dot{width:3px;height:22px;border-radius:2px;background:var(--gold-bright);}

@media(pointer:coarse){#c-dot,#c-spotlight{display:none;}}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--void);}
::-webkit-scrollbar-thumb{background:#2a1800;border-radius:2px;}

/* ── Dot grid ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(240,180,41,.06) 1px,transparent 1px);
  background-size:36px 36px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 100%);
  animation:gridDrift 30s ease-in-out infinite alternate;
}

@keyframes gridDrift{from{background-position:0 0;}to{background-position:36px 36px;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{from{opacity:0;transform:scale(.93) translateY(18px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes panelIn{from{opacity:0;transform:translateY(-10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes shimmer{from{background-position:-200% center;}to{background-position:200% center;}  }
@keyframes pulse{0%,100%{opacity:.35;transform:scale(1);}50%{opacity:.7;transform:scale(1.06);}}
@keyframes floatP{
  0%{transform:translateY(0) translateX(0) scale(1);opacity:0;}
  10%{opacity:1;}90%{opacity:.5;}
  100%{transform:translateY(-120vh) translateX(var(--dx)) scale(.3);opacity:0;}
}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px) scale(.95);}}
@keyframes streakPop{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}
@keyframes confettiDrop{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110px) rotate(720deg);opacity:0;}}
@keyframes pipPulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
@keyframes drawX{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes orbPulse{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.6;transform:scale(1.06);}}

/* ── Shimmer text ── */
.shimmer-txt{
  background:linear-gradient(90deg,#fff 0%,#fff 40%,rgba(255,255,255,.4) 50%,#fff 60%,#fff 100%);
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 3s linear infinite;
}

/* ── KBD ── */
.kbd{
  display:inline-block;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);border-radius:5px;
  padding:2px 7px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.38);
}

/* ── 3D Flip ── */
.card-scene{
  animation:cardIn .45s cubic-bezier(.34,1.56,.64,1) forwards;
  perspective:1200px;cursor:pointer;
}
.flip-wrap{
  transition:transform .65s cubic-bezier(.4,.2,.2,1);
  transform-style:preserve-3d;position:relative;width:100%;
}
.flip-wrap.flipped{transform:rotateY(180deg);}
.face,.back-face{
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:22px;width:100%;
}
.face{position:relative;min-height:340px;}
.back-face{position:absolute;top:0;left:0;min-height:100%;transform:rotateY(180deg);}

/* ── Buttons ── */
.btn-nav{transition:all .2s ease;}
.btn-nav:hover{background:rgba(255,255,255,.08)!important;transform:translateY(-1px);}
.btn-nav:active{transform:scale(.97);}
.btn-flip{transition:all .25s ease;position:relative;overflow:hidden;}
.btn-flip:hover{transform:translateY(-2px);filter:brightness(1.15);}
.btn-flip:active{transform:scale(.97);}
.rating-btn{transition:all .2s cubic-bezier(.34,1.56,.64,1);cursor:pointer;border:none;outline:none;}
.rating-btn:hover{transform:scale(1.12) translateY(-1px);}
.rating-btn:active{transform:scale(.95);}
.dot{transition:all .4s cubic-bezier(.34,1.56,.64,1);cursor:pointer;}
.dot:hover{transform:scale(1.7)!important;}

/* ── Filter pills ── */
.tag-pill{transition:all .22s;cursor:pointer;}
.tag-pill:hover{filter:brightness(1.3);transform:scale(1.05);}

/* ── Search ── */
.search-input{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:9px 36px 9px 36px;color:#fff;
  font-family:var(--mono);font-size:12px;width:100%;outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:rgba(255,255,255,.22);}
.search-input::placeholder{color:rgba(255,255,255,.2);}

/* ── Toast ── */
.toast{animation:toastIn .3s ease forwards;}
.toast.out{animation:toastOut .3s ease forwards;}

/* ── Confetti ── */
.confetti{position:fixed;pointer-events:none;z-index:9999;animation:confettiDrop .9s ease-in forwards;}

/* ── Stats panel ── */
.stats-panel{animation:panelIn .25s ease forwards;}

/* ── Confirm overlay ── */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
  display:flex;align-items:center;justify-content:center;
  animation:toastIn .2s ease forwards;backdrop-filter:blur(4px);
}

/* ── Streak ── */
.streak-num{display:inline-block;animation:streakPop .4s ease;}
</style>
</head>

var ALL_CARDS = [
  {id:1,  category:"FUNDAMENTALS", icon:"◈", tag:"Core Concept",
   front:"What is RAG?",
   back:"Retrieval-Augmented Generation — a technique that enhances LLMs by retrieving relevant external documents at query time and injecting them as context before generating a response.",
   gradient:"linear-gradient(135deg,#0f2027,#203a43,#2c5364)", glow:"#00d4ff"},
  {id:2,  category:"FUNDAMENTALS", icon:"◉", tag:"Motivation",
   front:"Why was RAG invented?",
   back:"LLMs have a fixed training cutoff and no access to private or proprietary data. RAG bridges this gap by connecting the model to live, external knowledge sources — without retraining the model.",
   gradient:"linear-gradient(135deg,#1a0533,#2d1060,#1a0533)", glow:"#a855f7"},
  {id:3,  category:"ARCHITECTURE", icon:"⬡", tag:"Pipeline",
   front:"What are the 3 core steps of RAG?",
   back:"1. RETRIEVE — Search a vector database for relevant chunks using semantic similarity.\n2. AUGMENT — Prepend retrieved chunks to the user's prompt as context.\n3. GENERATE — The LLM produces a grounded answer from that context.",

  {id:4,  category:"ARCHITECTURE", icon:"⬢", tag:"Storage",

  {id:5,  category:"ARCHITECTURE", icon:"∿", tag:"Representation",
   front:"What are Embeddings?",
   back:"Dense numerical representations of text (e.g., 1536-dimensional vectors). Words or sentences with similar meanings cluster close together in this vector space, enabling semantic similarity search.",
   gradient:"linear-gradient(135deg,#1a0a0a,#4a1010,#1a0a0a)", glow:"#ff4444"},
  {id:6,  category:"ARCHITECTURE", icon:"⚟", tag:"Preprocessing",
   front:"What is Chunking?",
   back:"Splitting large documents into smaller pieces before embedding. Good chunking considers sentence boundaries, paragraphs, or token limits (256–512 tokens per chunk) to preserve meaning and context.",
   gradient:"linear-gradient(135deg,#001a1a,#004444,#001a1a)", glow:"#00ffff"},
  {id:7,  category:"RETRIEVAL", icon:"⌖", tag:"Search",
   front:"What is Similarity Search?",
   back:"Finding the most relevant chunks by computing distance between the query embedding and stored embeddings.\n\nCommon metrics:\n• Cosine Similarity\n• Dot Product\n• Euclidean Distance",

  {id:8,  category:"RETRIEVAL", icon:"⊕", tag:"Advanced Retrieval",
   front:"What is Hybrid Search?",
   back:"A retrieval strategy combining dense vector search (semantic) with sparse keyword search (BM25/TF-IDF). Results are merged via a re-ranker, improving both precision and recall over either method alone.",
   gradient:"linear-gradient(135deg,#001a0a,#003322,#001a0a)", glow:"#00ee77"},
  {id:9,  category:"RETRIEVAL", icon:"⟁", tag:"Optimization",
   front:"What is a Re-ranker?",
   back:"A model that takes retrieved candidates and re-scores them for true relevance. Cross-encoders (e.g., Cohere Rerank) read the query and document together for high-accuracy ranking.",

  {id:10, category:"ADVANCED", icon:"◬", tag:"Technique",

  {id:12, category:"ADVANCED", icon:"⬡", tag:"Microsoft Research",

/* ── Fisher-Yates ── */
function shuffle(arr){
  var a=[].concat(arr);
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

/* ── Session persistence ── */
var SK="rag_session_v2";
function loadSess(){
  try{
    var raw=localStorage.getItem(SK);
    if(!raw)return null;
    var d=JSON.parse(raw);
    return{
      bookmarks:new Set(d.bookmarks||[]),
      ratings:d.ratings||{},
      seen:new Set(d.seen||[]),
      streak:d.streak||0,
      timer:d.timer||0
    };
  }catch(e){return null;}
}
function saveSess(){
  try{
    localStorage.setItem(SK,JSON.stringify({
      bookmarks:[].concat(Array.from(state.bookmarks)),
      ratings:state.ratings,
      seen:[].concat(Array.from(state.seen)),
      streak:state.streak,
      timer:state.timer
    }));
  }catch(e){}
}

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
var saved=loadSess()||{};
var state={
  deck:[].concat(ALL_CARDS),
  idx:0,
  flipped:false,
  animKey:0,
  bookmarks:saved.bookmarks||new Set(),
  ratings:saved.ratings||{},
  filter:"ALL",
  search:"",
  shuffled:false,
  showStats:false,
  showSearch:false,
  showConfirm:false,
  streak:saved.streak||0,
  timer:saved.timer||0,
  timerOn:false,
  seen:saved.seen||new Set(),
  deckComplete:false
};

/* ── Computed ── */
function getFiltered(){
  return state.deck.filter(function(c){
    var mCat=
      state.filter==="ALL"       ? true :
      state.filter==="BOOKMARKS" ? state.bookmarks.has(c.id) :
      state.filter==="HARD"      ? state.ratings[c.id]==="hard" :
      c.category===state.filter;
    var mS=state.search.trim()===""?true:
      c.front.toLowerCase().includes(state.search.toLowerCase())||
      c.back.toLowerCase().includes(state.search.toLowerCase());
    return mCat&&mS;
  });
}

function safeIdx(deck){return Math.min(state.idx,Math.max(deck.length-1,0));}
function currentCard(){
  var d=getFiltered();
  return d[safeIdx(d)]||ALL_CARDS[0];
}

/* ════════════════════════════════════════════════
   PERSISTENCE  (auto-save on every change)
════════════════════════════════════════════════ */
function persist(){saveSess();}

/* ════════════════════════════════════════════════
   TIMER
════════════════════════════════════════════════ */
var timerInterval=null;
function startTimer(){
  if(timerInterval)return;
  timerInterval=setInterval(function(){
    state.timer++;
    persist();
    renderToolbar();
  },1000);
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
var toastTO=null;
function showToast(msg,color){
  var el=document.getElementById('toast');
  if(!el)return;
  clearTimeout(toastTO);
  el.textContent=msg;
  el.style.color=color;
  el.style.background='rgba(10,10,20,.96)';
  el.style.border='1px solid '+color+'40';
  el.style.boxShadow='0 0 20px '+color+'28';
  el.style.display='block';
  el.className='toast';
  toastTO=setTimeout(function(){
    el.className='toast out';
    setTimeout(function(){el.style.display='none';},320);
  },1800);
}

/* ════════════════════════════════════════════════
   CONFETTI
════════════════════════════════════════════════ */
function fireConfetti(color){
  var c=document.getElementById('confetti-container');
  if(!c)return;
  for(var i=0;i<28;i++){
    (function(i){
      var p=document.createElement('div');
      p.className='confetti';
      p.style.left=Math.random()*100+'%';
      p.style.top='15%';
      p.style.width=p.style.height=(6+Math.random()*6)+'px';
      p.style.background=color;
      p.style.borderRadius=Math.random()>.5?'50%':'3px';
      p.style.animationDelay=(Math.random()*.35)+'s';
      c.appendChild(p);
      setTimeout(function(){p.remove();},1400);
    })(i);
  }
}

/* ════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════ */
function goTo(i,deckLen){
  if(!deckLen)return;
  var clamped=((i%deckLen)+deckLen)%deckLen;
  state.flipped=false;
  setTimeout(function(){
    state.idx=clamped;
    state.animKey++;
    render();
  },180);
}
function goNext(){
  var d=getFiltered();
  state.seen.add(currentCard().id);
  persist();
  checkComplete();
  goTo(safeIdx(d)+1,d.length);
}
function goPrev(){
  var d=getFiltered();
  goTo(safeIdx(d)-1,d.length);
}
function checkComplete(){
  if(state.seen.size===ALL_CARDS.length&&!state.deckComplete){
    state.deckComplete=true;
    fireConfetti('#00ff88');
    showToast('🎉 Deck complete! All 15 cards seen!','#00ff88');
  }
}

/* ════════════════════════════════════════════════
   BOOKMARKS
════════════════════════════════════════════════ */
function toggleBookmark(id){
  if(state.bookmarks.has(id)){state.bookmarks.delete(id);showToast('Bookmark removed','#888');}
  else{state.bookmarks.add(id);showToast('Bookmarked ✦','#ffdd00');}
  persist();render();
}

/* ════════════════════════════════════════════════
   RATING
════════════════════════════════════════════════ */
function handleRate(level){
  var d=getFiltered();
  var si=safeIdx(d);
  var card=d[si];
  state.ratings[card.id]=level;
  state.seen.add(card.id);
  persist();
  if(level==='easy'){
    state.streak++;
    persist();
    if(state.streak%5===0)fireConfetti(card.glow);
    showToast('Easy ✓','#00ff88');
  }else if(level==='medium'){
    showToast('Getting there ◎','#ffdd00');
  }else{
    state.streak=0;
    persist();
    showToast('Mark for review ✕','#ff4444');
  }
  checkComplete();
  setTimeout(function(){goTo(si+1,d.length);},400);
}

/* ════════════════════════════════════════════════
   SHUFFLE
════════════════════════════════════════════════ */
function toggleShuffle(){
  state.deck=state.shuffled?[].concat(ALL_CARDS):shuffle(ALL_CARDS);
  state.shuffled=!state.shuffled;
  state.idx=0;state.flipped=false;
  showToast(state.shuffled?'Deck shuffled ⟳':'Order restored','#f0b429');
  render();
}

/* ════════════════════════════════════════════════
   RESET
════════════════════════════════════════════════ */
function doReset(){
  state.seen=new Set();state.ratings={};state.bookmarks=new Set();
  state.streak=0;state.timer=0;state.timerOn=false;
  state.idx=0;state.flipped=false;
  state.deck=[].concat(ALL_CARDS);state.shuffled=false;
  state.deckComplete=false;state.showConfirm=false;
  stopTimer();
  localStorage.removeItem(SK);
  showToast('Session reset','#888');
  render();
}

/* ════════════════════════════════════════════════
   PARTICLES
════════════════════════════════════════════════ */
(function(){
  var pc=document.getElementById('particles');
  if(!pc)return;
  for(var i=0;i<16;i++){

    var sz=(1+Math.random()*2.5)+'px';

})();

function updateParticleColor(glow){
  var pc=document.getElementById('particles');
  if(!pc)return;
  var ps=pc.querySelectorAll('div');
  ps.forEach(function(p){
    p.style.background=glow;
    p.style.boxShadow='0 0 5px '+glow;
  });
}

/* ════════════════════════════════════════════════
   AMBIENT ORB
════════════════════════════════════════════════ */
function updateOrb(glow){
  var orb=document.getElementById('amb-orb');
  if(!orb)return;
  orb.style.background='radial-gradient(circle,'+glow+'12 0%,transparent 70%)';
}

/* ════════════════════════════════════════════════
   RENDER FUNCTIONS
════════════════════════════════════════════════ */

/* ── Toolbar ── */
function renderToolbar(){
  var tb=document.getElementById('toolbar');
  if(!tb)return;
  var card=currentCard();
  var btns=[
    {label:state.showSearch?'⌕ Hide':'⌕ Search', active:state.showSearch, action:'search'},
    {label:state.shuffled?'⟳ Ordered':'⟳ Shuffle', active:state.shuffled, action:'shuffle'},
    {label:'◈ Stats', active:state.showStats, action:'stats'},
    {label:state.timerOn?'⏱ '+fmt(state.timer):'⏱ Timer', active:state.timerOn, action:'timer'},
    {label:'↺ Reset', active:false, action:'reset'}
  ];
  tb.innerHTML='';
  btns.forEach(function(b){
    var btn=document.createElement('button');
    btn.textContent=b.label;
    btn.style.cssText='background:'+(b.active?card.glow+'18':'rgba(255,255,255,.04)')+
      ';border:1px solid '+(b.active?card.glow+'40':'rgba(255,255,255,.08)')+
      ';color:'+(b.active?card.glow:'rgba(255,255,255,.45)')+
      ';padding:7px 13px;border-radius:9px;cursor:pointer;'+
      'font-size:11px;font-family:var(--mono);letter-spacing:.08em;transition:all .2s;';
    btn.addEventListener('click',function(){
      if(b.action==='search'){state.showSearch=!state.showSearch;if(!state.showSearch){state.search='';state.idx=0;state.flipped=false;}render();}
      else if(b.action==='shuffle')toggleShuffle();
      else if(b.action==='stats'){state.showStats=!state.showStats;render();}
      else if(b.action==='timer'){
        state.timerOn=!state.timerOn;
        if(state.timerOn)startTimer();else stopTimer();
        render();
      }
      else if(b.action==='reset'){state.showConfirm=true;renderConfirm();}
    });
    addHoverClass(btn);
    tb.appendChild(btn);
  });
}

/* ── Search ── */
function renderSearch(){
  var wrap=document.getElementById('search-wrap');
  var inp=document.getElementById('search-input');
  var clr=document.getElementById('search-clear');
  var cnt=document.getElementById('search-count');
  if(!wrap)return;
  wrap.style.display=state.showSearch?'block':'none';
  if(state.showSearch){
    inp.value=state.search;
    clr.style.display=state.search?'block':'none';
    if(state.search){
      var d=getFiltered();
      cnt.textContent=d.length+'/'+ALL_CARDS.length;
      cnt.style.display='block';
      cnt.style.right=state.search?'42px':'10px';
    }else{
      cnt.style.display='none';
    }
  }
}

        {l:'Rated',val:rated,c:'#a855f7'}

/* ── Filter bar ── */
function renderFilterBar(){
  var fb=document.getElementById('filter-bar');
  if(!fb)return;
  var filters=['ALL','BOOKMARKS','HARD'].concat(Object.keys(CAT_META));
  fb.innerHTML='';
  filters.forEach(function(f){
    var isActive=state.filter===f;
    var color=f==='ALL'?'#888':f==='BOOKMARKS'?'#ffdd00':f==='HARD'?'#ff4444':CAT_META[f].color;
    var count=f==='ALL'?ALL_CARDS.length:
      f==='BOOKMARKS'?state.bookmarks.size:
      f==='HARD'?Object.values(state.ratings).filter(function(v){return v==='hard';}).length:
      ALL_CARDS.filter(function(c){return c.category===f;}).length;
    var lbl=f==='BOOKMARKS'?'✦ '+f:f==='HARD'?'✕ '+f:f;
    var btn=document.createElement('button');
    btn.textContent=lbl+(count>0?' ('+count+')':'');
    btn.className='tag-pill';
    btn.style.cssText='background:'+(isActive?color+'20':'rgba(255,255,255,.03)')+
      ';border:1px solid '+(isActive?color+'50':'rgba(255,255,255,.07)')+

}

        '</div>'+

        /* BACK */
        '<div class="back-face" style="background:'+card.gradient+
          ';border:1px solid '+card.glow+'45'+
          ';box-shadow:0 0 0 1px '+card.glow+'20,0 24px 60px rgba(0,0,0,.7),0 0 50px '+card.glow+'12,inset 0 1px 0 rgba(255,255,255,.07)'+
          ';overflow:hidden;padding:0;display:flex;flex-direction:column;">'+
          /* top label */
          '<div style="padding:20px 40px 12px;flex-shrink:0;">'+
            '<div style="font-size:8px;letter-spacing:.3em;color:'+card.glow+
              ';font-family:var(--mono);text-transform:uppercase;">▸ Answer</div>'+
            '<div style="margin-top:8px;height:1px;'+
              'background:linear-gradient(90deg,'+card.glow+'50,transparent);"></div>'+
          '</div>'+
          /* answer text — centered in remaining space above rating strip */
          '<div style="flex:1;display:flex;align-items:center;justify-content:center;'+
            'padding:0 40px;overflow-y:auto;">'+
            '<div style="font-size:clamp(14px,2vw,16px);color:rgba(255,255,255,.9);'+
              'line-height:1.9;white-space:pre-line;font-family:Georgia,serif;'+
              'font-weight:400;text-align:center;width:100%;">'+card.back+'</div>'+
          '</div>'+
          /* rating strip */
          '<div style="flex-shrink:0;'+
            'border-top:1px solid '+card.glow+'20;border-radius:0 0 22px 22px;'+
            'background:rgba(0,0,0,.5);backdrop-filter:blur(12px);'+
            'display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;">'+
            '<span style="font-size:7px;color:'+card.glow+'70;font-family:var(--mono);'+
              'letter-spacing:.2em;text-transform:uppercase;margin-right:2px;">HOW\'D IT GO?</span>'+
            ['easy','medium','hard'].map(function(level,i){
              var labels=['Easy','Medium','Hard'];
              var colors=['#00ff88','#ffdd00','#ff4444'];
              var keys=['1','2','3'];
              return '<button class="rating-btn" data-level="'+level+'" style="background:'+colors[i]+'15;border:1px solid '+colors[i]+'40;'+
                'color:'+colors[i]+';padding:6px 12px;border-radius:8px;font-size:10px;font-family:var(--ff);font-weight:700;">'+
                labels[i]+' <span class="kbd">'+keys[i]+'</span></button>';
            }).join('')+
          '</div>'+
          '<div style="position:absolute;inset:0;border-radius:22px;pointer-events:none;'+
            'background:radial-gradient(ellipse at 50% 100%,'+card.glow+'09 0%,transparent 60%);"></div>'+
        '</div>'+
      '</div>'+
    '</div>';

  /* Bind flip click */
  var scene=document.getElementById('card-scene-'+state.animKey);
  if(scene){
    scene.addEventListener('click',function(e){
      if(e.target.classList.contains('rating-btn')||e.target.closest&&e.target.closest('.rating-btn'))return;
      state.flipped=!state.flipped;
      var fw=document.getElementById('flip-wrap');
      if(fw){fw.className='flip-wrap'+(state.flipped?' flipped':'');}
    });
    addHoverClass(scene);
  }

  /* Bind rating buttons */
  area.querySelectorAll('.rating-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      handleRate(this.dataset.level);
    });
    addHoverClass(btn);
  });
}

/* ── Nav controls ── */
function renderNavControls(){
  var nc=document.getElementById('nav-controls');
  if(!nc)return;
  var card=currentCard();
  nc.innerHTML=
    '<button class="btn-nav" id="btn-prev" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);'+
      'color:rgba(255,255,255,.45);padding:12px 18px;border-radius:11px;cursor:pointer;font-size:12px;font-family:var(--ff);letter-spacing:.04em;">'+
      '← <span class="kbd">P</span></button>'+
    '<button class="btn-flip" id="btn-flip" style="background:linear-gradient(135deg,'+card.glow+'cc,'+card.glow+'88);'+
      'border:none;color:#000;padding:12px 30px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;'+
      'font-family:var(--ff);letter-spacing:.07em;box-shadow:0 4px 20px '+card.glow+'35;">'+
      (state.flipped?'◈ Hide':'◈ Reveal')+' <span style="opacity:.6;font-weight:400;">Space</span></button>'+
    '<button class="btn-nav" id="btn-bm" style="background:'+(state.bookmarks.has(card.id)?'rgba(255,221,0,.08)':'rgba(255,255,255,.04)')+
      ';border:1px solid '+(state.bookmarks.has(card.id)?'#ffdd0040':'rgba(255,255,255,.09)')+
      ';color:'+(state.bookmarks.has(card.id)?'#ffdd00':'rgba(255,255,255,.35)')+
      ';padding:12px 13px;border-radius:11px;cursor:pointer;font-size:15px;transition:all .2s;">✦</button>'+
    '<button class="btn-nav" id="btn-next" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);'+
      'color:rgba(255,255,255,.45);padding:12px 18px;border-radius:11px;cursor:pointer;font-size:12px;font-family:var(--ff);letter-spacing:.04em;">'+
      '<span class="kbd">N</span> →</button>';

  document.getElementById('btn-prev').addEventListener('click',goPrev);
  document.getElementById('btn-flip').addEventListener('click',function(){
    state.flipped=!state.flipped;
    var fw=document.getElementById('flip-wrap');
    if(fw){fw.className='flip-wrap'+(state.flipped?' flipped':'');}
    renderNavControls();
  });
  document.getElementById('btn-bm').addEventListener('click',function(){toggleBookmark(card.id);});
  document.getElementById('btn-next').addEventListener('click',goNext);

  nc.querySelectorAll('button').forEach(addHoverClass);
}

/* ── Dot nav ── */
function renderDotNav(){
  var dn=document.getElementById('dot-nav');
  if(!dn)return;
  var d=getFiltered();
  var si=safeIdx(d);
  dn.innerHTML='';
  d.forEach(function(c,i){
    var m=CAT_META[c.category];
    var isActive=i===si;
    var dot=document.createElement('div');
    dot.className='dot';
    dot.title=c.front;
    dot.style.cssText='width:'+(isActive?'22':'7')+'px;height:7px;border-radius:4px;'+
      'background:'+(isActive?m.color:state.seen.has(c.id)?'rgba(255,255,255,.15)':'rgba(255,255,255,.05)')+
      ';box-shadow:'+(isActive?'0 0 8px '+m.color:'none')+';cursor:pointer;'+
      'transition:all .4s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;';
    (function(idx,dLen){
      dot.addEventListener('click',function(){goTo(idx,dLen);});
    })(i,d.length);
    dn.appendChild(dot);
  });
}

/* ── Keyboard hints ── */
function renderKbdHints(){
  var kh=document.getElementById('kbd-hints');
  if(!kh)return;
  var hints=[['Space','Flip'],['← →','Navigate'],['B','Bookmark'],['1-3','Rate'],['S','Search'],['T','Timer'],['Esc','Close']];
  kh.innerHTML=hints.map(function(h){
    return '<div style="display:flex;align-items:center;gap:4px;">'+
      '<span class="kbd">'+h[0]+'</span>'+
      '<span style="font-size:8px;color:rgba(255,255,255,.2);letter-spacing:.1em;font-family:var(--mono);">'+h[1]+'</span>'+
    '</div>';
  }).join('');
}

/* ── Confirm dialog ── */
function renderConfirm(){
  var ov=document.getElementById('confirm-overlay');
  var card=currentCard();
  var ok=document.getElementById('confirm-ok');
  if(ok){ok.style.background=card.glow;ok.style.color=isLight(card.glow)?'#000':'#fff';}
  ov.style.display=state.showConfirm?'flex':'none';
}

function isLight(hex){
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');
  var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
  return(r*299+g*587+b*114)/1000>155;
}

/* ── Master render ── */
function render(){
  renderToolbar();
  renderSearch();
  renderStats();
  renderFilterBar();
  renderProgress();
  renderCard();
  renderNavControls();
  renderDotNav();
  renderKbdHints();
  renderConfirm();
}

/* ════════════════════════════════════════════════
   ENHANCED SPOTLIGHT CURSOR
════════════════════════════════════════════════ */
(function(){
  var dot=document.getElementById('c-dot');
  var spl=document.getElementById('c-spotlight');
  if(!dot)return;
  var mx=window.innerWidth/2, my=window.innerHeight/2;
  var glowHex='rgba(240,180,41,';
  document.addEventListener('mousemove',function(e){
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
    if(spl){
      spl.style.background=
        'radial-gradient(circle 120px at '+mx+'px '+my+'px,'+
        glowHex+'0.14) 0%,'+glowHex+'0.06) 38%,transparent 68%)';
    }
  });
  document.addEventListener('mousedown',function(e){
    document.body.classList.add('cc');
    var r=document.createElement('div');
    r.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;'+
      'width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:99990;'+
      'background:rgba(240,180,41,.5);transform:translate(-50%,-50%) scale(1);'+
      'transition:transform .55s cubic-bezier(.2,.8,.3,1),opacity .55s ease;';
    document.body.appendChild(r);
    requestAnimationFrame(function(){r.style.transform='translate(-50%,-50%) scale(10)';r.style.opacity='0';});
    setTimeout(function(){r.remove();},620);
  });
  document.addEventListener('mouseup',function(){document.body.classList.remove('cc');});
  function addInteractive(sel){
    document.querySelectorAll(sel).forEach(function(el){
      el.addEventListener('mouseenter',function(){document.body.classList.add('ch');});
      el.addEventListener('mouseleave',function(){document.body.classList.remove('ch');});
    });
  }
  addInteractive('a,button,.card-scene,.rating-btn,.dot,.tag-pill,.btn-nav,.btn-flip');
  document.querySelectorAll('input,textarea').forEach(function(el){
    el.addEventListener('mouseenter',function(){document.body.classList.add('ct');});
    el.addEventListener('mouseleave',function(){document.body.classList.remove('ct');});
  });
  /* Dynamic re-bind for rendered cards */
  var mo=new MutationObserver(function(){
    addInteractive('a,button,.card-scene,.rating-btn,.dot,.tag-pill,.btn-nav,.btn-flip');
    document.querySelectorAll('input,textarea').forEach(function(el){
      el.addEventListener('mouseenter',function(){document.body.classList.add('ct');});
      el.addEventListener('mouseleave',function(){document.body.classList.remove('ct');});
    });
  });
  mo.observe(document.body,{childList:true,subtree:true});
  /* Expose glow colour updater so renderCard() can tint spotlight */
  window.setCursorGlow=function(hex){
    glowHex=hexToRgba(hex);
    dot.style.boxShadow='0 0 0 2px '+glowHex+'.15),0 0 14px 4px '+hex+',0 0 30px 8px '+glowHex+'.30)';

  };
  function hexToRgba(hex){
    hex=hex.replace('#','');
    if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');
    var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
    return 'rgba('+r+','+g+','+b+',';
  }
})();

function addHoverClass(el){
  el.addEventListener('mouseenter',function(){document.body.classList.add('ch');});
  el.addEventListener('mouseleave',function(){document.body.classList.remove('ch');});
}

/* ════════════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    state.showSearch=false;state.showStats=false;state.showConfirm=false;state.search='';
    render();return;
  }
  if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
  var d=getFiltered();
  var si=safeIdx(d);
  var card=d[si]||ALL_CARDS[0];
  if(e.key===' '||e.key==='f'){e.preventDefault();state.flipped=!state.flipped;var fw=document.getElementById('flip-wrap');if(fw)fw.className='flip-wrap'+(state.flipped?' flipped':'');renderNavControls();}
  if(e.key==='ArrowRight'||e.key==='n'){state.seen.add(card.id);persist();checkComplete();goTo(si+1,d.length);}
  if(e.key==='ArrowLeft'||e.key==='p')goTo(si-1,d.length);
  if(e.key==='b'){toggleBookmark(card.id);}
  if(e.key==='s'){state.showSearch=!state.showSearch;if(!state.showSearch){state.search='';state.idx=0;state.flipped=false;}render();setTimeout(function(){var i=document.getElementById('search-input');if(i&&state.showSearch)i.focus();},50);}
  if(e.key==='t'){state.timerOn=!state.timerOn;if(state.timerOn)startTimer();else stopTimer();render();}
  if(state.flipped){
    if(e.key==='1')handleRate('easy');
    if(e.key==='2')handleRate('medium');
    if(e.key==='3')handleRate('hard');
  }
});

/* ── Search input event ── */
document.addEventListener('input',function(e){
  if(e.target&&e.target.id==='search-input'){
    state.search=e.target.value;
    state.idx=0;state.flipped=false;
    renderSearch();renderProgress();renderCard();renderNavControls();renderDotNav();renderFilterBar();
  }
});
document.addEventListener('click',function(e){
  if(e.target&&e.target.id==='search-clear'){
    state.search='';state.idx=0;state.flipped=false;
    render();
  }
});

/* ── Touch/swipe ── */
(function(){
  var tx=0,ty=0;
  document.addEventListener('touchstart',function(e){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx;
    var dy=e.changedTouches[0].clientY-ty;
    var d=getFiltered();
    var si=safeIdx(d);
    var card=d[si]||ALL_CARDS[0];
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      if(dx<0){state.seen.add(card.id);persist();checkComplete();goTo(si+1,d.length);}
      else goTo(si-1,d.length);
    }else if(dy<-60&&Math.abs(dy)>Math.abs(dx)){
      state.flipped=!state.flipped;
      var fw=document.getElementById('flip-wrap');
      if(fw)fw.className='flip-wrap'+(state.flipped?' flipped':'');
      renderNavControls();
    }
  },{passive:true});
})();

/* ── Confirm dialog buttons ── */
document.getElementById('confirm-cancel').addEventListener('click',function(){state.showConfirm=false;render();});
document.getElementById('confirm-ok').addEventListener('click',doReset);
document.getElementById('confirm-overlay').addEventListener('click',function(e){if(e.target===this){state.showConfirm=false;render();}});

/* ── Back button hover ── */
var bb=document.getElementById('back-btn');
if(bb){
  addHoverClass(bb);
  bb.addEventListener('mouseenter',function(){this.style.borderColor='rgba(240,180,41,.3)';this.style.color='rgba(221,230,245,.6)';});
  bb.addEventListener('mouseleave',function(){this.style.borderColor='rgba(255,255,255,.07)';this.style.color='rgba(221,230,245,.35)';});
}

/* ── Initial render ── */
render();
</script>
